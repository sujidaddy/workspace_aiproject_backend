name: Maven Build and Deploy to AL2023

on:
  push:
    branches: [ "main" ] # 실제 사용 중인 브랜치명 확인

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21 # 프로젝트 자바 버전에 맞게 수정 (예: 11, 17, 21)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 1. Maven 빌드 실행 (Windows의 mvnw와 동일)
      - name: Build with Maven
        working-directory: aiprojectserver
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # 2. 서버 폴더 생성 및 기존 파일 정리 (선택 사항)
      - name: Prepare Server Directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: mkdir -p /home/ec2-user/workspace_wwtp/Spring

      # 3. 빌드된 JAR 파일을 서버로 전송
      - name: Copy JAR to AL2023
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          source: "aiprojectserver/target/*.jar"
          target: "/home/ec2-user/workspace_wwtp/Spring"
          strip_components: 2  # aiprojectserver/target/ 둘 다 제거

      # 4. SSH를 통해 서버에서 PM2 명령 실행
      - name: Restart PM2 Application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ec2-user/workspace_wwtp/Spring
            pm2 restart FlowWater-server --update-env